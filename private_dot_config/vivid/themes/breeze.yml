# Breeze Theme for vivid
---
colors:
  # basic color
  fg: "eff0f1"
  bg: "31363b"
  # path
  dir_blue: "1d99f3"
  link_cyan: "1abc9c"
  link_green: "1abc5f"
  link_red: "96281b"
  path_cyan: "3daee9"
  # logic/code
  code_mint: "1cdc9a"
  exec_lime: "11d116"
  doc_emerald: "27ae60"
  # config/doc
  char_goldpowder: "f9c380"
  conf_yellow: "f1c40f"
  conf_amber: "f1882e"
  conf_withered: "aa9630"
  data_orange: "ac7400"
  git_withered: "aa7936"
  readme_gold: "ffbc4b"
  # archive
  pack_amber: "b67e22"
  tar_orange: "d3542f"
  heavy_red: "96283f"
  # stylefile
  web_amber: "b35230"
  record_red: "f56965"
  # media
  audio_pink: "f290ab"
  img_lavender: "9b59b6"
  vid_wisteria: "d186e8"
  font_dahlia: "d199af"
  space_rose: "af0255"
  # --- status ---
  script_vermil: "af415f"
  system_crimson: "dc143c"
  tool_crimson: "df6660"
  # gray
  mute_gray: "7f8c8d"
  deep_gray: "4d5057"
  warn_bg: "3d2b1f"
  err_bg: "351a1a"
core:
  normal_text:
    foreground: fg
  regular_file: {}
  reset_to_normal:
    foreground: fg
  directory:
    foreground: dir_blue
    font-style: bold
  executable_file:
    foreground: exec_lime
    font-style: bold
  file_with_capability:
    background: deep_gray
  setuid:
    background: heavy_red
    foreground: fg
  setgid:
    background: data_orange
    foreground: bg
  sticky:
    background: deep_gray
  sticky_other_writable:
    foreground: bg
    background: exec_lime
    font-style: bold
  other_writable:
    foreground: dir_blue
    background: deep_gray
    font-style: bold
  symlink:
    foreground: link_cyan
    font-style: italic
  broken_symlink:
    background: link_red
    font-style: italic
  missing_symlink_target:
    foreground: link_red
    font-style: italic
  multi_hard_link:
    foreground: link_green
    font-style: underline
  socket:
    foreground: tool_crimson
    background: deep_gray
    font-style: bold
  fifo:
    foreground: data_orange
    background: warn_bg
    font-style: bold
  door:
    foreground: link_cyan
    background: bg
    font-style: bold
  block_device:
    foreground: heavy_red
    background: err_bg
    font-style: bold
  character_device:
    foreground: char_goldpowder
    background: warn_bg
    font-style: bold
executable:
  foreground: exec_lime
archives:
  foreground: tar_orange
  font-style: bold
  packages:
    foreground: pack_amber
    font-style: bold
  images:
    foreground: heavy_red
    font-style: italic
media:
  audio:
    foreground: audio_pink
    font-style: bold
  image:
    foreground: img_lavender
    font-style: bold
  video:
    foreground: vid_wisteria
    font-style: bold
  fonts:
    foreground: font_dahlia
    font-style: bold
  3d:
    foreground: space_rose
    font-style: bold
office:
  foreground: doc_emerald
  font-style: bold
text:
  foreground: fg
  configuration:
    foreground: conf_yellow
    dockerfile:
      foreground: data_orange
    system:
      foreground: system_crimson
      font-style: italic
  licenses:
    foreground: fg
    font-style: bold
  special:
    foreground: readme_gold
    font-style: bold
  todo:
    foreground: path_cyan
    font-style: bold
  other:
    font-style: italic
markup:
  foreground: link_cyan
  web:
    foreground: web_amber
  other:
    foreground: record_red
programming:
  foreground: code_mint
  source:
    foreground: code_mint
    shell:
      foreground: script_vermil
  tooling:
    foreground: path_cyan
    vcs:
      foreground: conf_withered
      git:
        foreground: git_withered
    build:
      foreground: conf_amber
unimportant:
  foreground: mute_gray
