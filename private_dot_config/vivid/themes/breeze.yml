# Breeze Theme for vivid
---
colors:
  # basic color
  fg: "eff0f1"
  bg: "31363b"
  # path
  dir_blue: "1d99f3"
  link_cyan: "1abc9c"
  link_hard: "1abc5f"
  path_cyan: "3daee9"
  link_dead: "96281b"
  # logic/code
  code_mint: "1cdc9a"
  exec_lime: "11d116"
  build_emerald: "27ae60"
  build_create: "f1882e"
  # config/doc
  conf_amber: "f9c380"
  conf_yellow: "f1c40f"
  data_orange: "ac7400"
  readme_gold: "ffbc4b"
  conf_rc: "aa9630"
  # archive
  arc_pack_amber: "b67e22"
  arc_tar_orange: "d3542f"
  arc_heavy_red: "96283f"
  # stylefile
  sty_web: "b35230"
  sty_record: "f56965"
  # media
  audio_gold: "f290ab"
  img_lavender: "9b59b6"
  vid_rose: "d186e8"
  font_ttf: "d199af"
  td_space: "af0255"
  # --- status ---
  script_vermil: "ac415f"
  system_crimson: "c0392b"
  tool_pink: "af7ac5"
  # gray
  mute_gray: "7f8c8d"
  deep_gray: "4d5057"
  warn_bg: "3d2b1f"
  err_bg: "351a1a"
core:
  normal_text:
    foreground: fg
  regular_file: {}
  reset_to_normal:
    foreground: fg
  directory:
    foreground: dir_blue
    font-style: bold
  executable_file:
    foreground: exec_lime
    font-style: bold
  file_with_capability:
    background: deep_gray
  setuid:
    background: arc_heavy_red
    foreground: fg
  setgid:
    background: data_orange
    foreground: bg
  sticky:
    background: deep_gray
  sticky_other_writable:
    foreground: bg
    background: exec_lime
    font-style: bold
  other_writable:
    foreground: dir_blue
    background: deep_gray
    font-style: bold
  symlink:
    foreground: link_cyan
    font-style: italic
  broken_symlink:
    background: link_dead
  missing_symlink_target:
    foreground: link_dead
  multi_hard_link:
    foreground: link_hard
    font-style: underline
  socket:
    foreground: tool_pink
    background: deep_gray
    font-style: bold
  fifo:
    foreground: data_orange
    background: warn_bg
    font-style: bold
  door:
    foreground: link_cyan
    background: bg
    font-style: bold
  block_device:
    foreground: arc_heavy_red
    background: err_bg
    font-style: bold
  character_device:
    foreground: conf_amber
    background: warn_bg
    font-style: bold
executable:
  foreground: exec_lime
archives:
  foreground: arc_tar_orange
  font-style: bold
  packages:
    foreground: arc_pack_amber
    font-style: bold
  images:
    foreground: arc_heavy_red
    font-style: italic
media:
  audio:
    foreground: audio_gold
    font-style: bold
  image:
    foreground: img_lavender
    font-style: bold
  video:
    foreground: vid_rose
    font-style: bold
  fonts:
    foreground: font_ttf
    font-style: bold
  3d:
    foreground: td_space
    font-style: bold
office:
  foreground: build_emerald
  font-style: bold
text:
  foreground: fg
  configuration:
    foreground: conf_yellow
    dockerfile:
      foreground: data_orange
    system:
      foreground: system_crimson
      font-style: italic
  licenses:
    foreground: fg
    font-style: bold
  special:
    foreground: readme_gold
    font-style: bold
  todo:
    foreground: path_cyan
    font-style: bold
  other:
    foreground: fg
    font-style: italic
markup:
  foreground: link_cyan
  web:
    foreground: sty_web
  other:
    foreground: sty_record
programming:
  foreground: code_mint
  source:
    foreground: code_mint
    shell:
      foreground: script_vermil
  tooling:
    foreground: path_cyan
    vcs:
      foreground: conf_rc
    build:
      foreground: build_create
unimportant:
  foreground: mute_gray
